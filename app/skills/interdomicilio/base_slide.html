<!DOCTYPE html>
<!-- skill v2 — cache bust Sprint 10 -->
<html lang="{LANGUAGE}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>{SECTION_TITLE} — {BRAND_NAME}</title>

  <!-- Fonts & icons (CDN OK pour viewer web) -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
  <!-- Chart.js (fix Sprint 13b) : les .md demographics/verdict demandent un donut
       et un radar mais Chart.js n'etait PAS charge → new Chart() levait une
       ReferenceError silencieuse, les graphiques n'apparaissaient jamais.
       Version epinglee. Pour l'export PPTX, pre-rendre en image (backlog). -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- NOTE: Tailwind CDN supprime (dev-only, casse en prod et export LibreOffice).
       Remplace par CSS utilitaires inline ci-dessous (~15kB, couvre toutes les classes skill). -->

  <style>
    /* ── Utilitaires Tailwind (inline, sans CDN) ─────────────────────
       Classes generees localement pour les skills Stella.
       Couvre flex, grid, gap, spacing, typography, colors, borders.
       CDN Tailwind supprime : dev-only, casse export LibreOffice.        */

    /* Flexbox */
    .flex{display:flex}.inline-flex{display:inline-flex}
    .flex-col{flex-direction:column}.flex-row{flex-direction:row}
    .flex-wrap{flex-wrap:wrap}.flex-1{flex:1 1 0%}.flex-none{flex:none}
    .items-center{align-items:center}.items-start{align-items:flex-start}
    .items-end{align-items:flex-end}.items-stretch{align-items:stretch}
    .justify-between{justify-content:space-between}
    .justify-center{justify-content:center}
    .justify-start{justify-content:flex-start}
    .justify-end{justify-content:flex-end}
    .self-center{align-self:center}.self-start{align-self:flex-start}
    .shrink-0{flex-shrink:0}.grow{flex-grow:1}

    /* Grid */
    .grid{display:grid}
    .grid-cols-1{grid-template-columns:repeat(1,minmax(0,1fr))}
    .grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .col-span-1{grid-column:span 1/span 1}
    .col-span-2{grid-column:span 2/span 2}
    .col-span-3{grid-column:span 3/span 3}
    .col-span-full{grid-column:1/-1}

    /* Gap */
    .gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
    .gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}
    .gap-x-2{column-gap:8px}.gap-x-4{column-gap:16px}
    .gap-y-1{row-gap:4px}.gap-y-2{row-gap:8px}.gap-y-4{row-gap:16px}

    /* Padding */
    .p-1{padding:4px}.p-2{padding:8px}.p-3{padding:12px}
    .p-4{padding:16px}.p-5{padding:20px}.p-6{padding:24px}
    .px-2{padding-left:8px;padding-right:8px}
    .px-3{padding-left:12px;padding-right:12px}
    .px-4{padding-left:16px;padding-right:16px}
    .px-6{padding-left:24px;padding-right:24px}
    .py-1{padding-top:4px;padding-bottom:4px}
    .py-2{padding-top:8px;padding-bottom:8px}
    .py-3{padding-top:12px;padding-bottom:12px}
    .py-4{padding-top:16px;padding-bottom:16px}
    .pt-1{padding-top:4px}.pt-2{padding-top:8px}.pt-4{padding-top:16px}
    .pb-2{padding-bottom:8px}.pb-4{padding-bottom:16px}
    .pl-3{padding-left:12px}.pl-4{padding-left:16px}
    .pr-3{padding-right:12px}.pr-4{padding-right:16px}

    /* Margin */
    .m-0{margin:0}.mx-auto{margin-left:auto;margin-right:auto}
    .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
    .mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-8{margin-top:32px}
    .mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
    .mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
    .ml-1{margin-left:4px}.ml-2{margin-left:8px}.ml-auto{margin-left:auto}
    .mr-1{margin-right:4px}.mr-2{margin-right:8px}
    .space-y-1>*+*{margin-top:4px}.space-y-2>*+*{margin-top:8px}
    .space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}
    .space-x-2>*+*{margin-left:8px}.space-x-4>*+*{margin-left:16px}

    /* Typography */
    .text-xs{font-size:11px;line-height:1.4}
    .text-sm{font-size:13px;line-height:1.45}
    .text-base{font-size:14px;line-height:1.5}
    .text-lg{font-size:16px;line-height:1.5}
    .text-xl{font-size:18px;line-height:1.4}
    .text-2xl{font-size:20px;line-height:1.35}
    .text-3xl{font-size:24px;line-height:1.3}
    .text-4xl{font-size:28px;line-height:1.25}
    .font-normal{font-weight:400}.font-medium{font-weight:500}
    .font-semibold{font-weight:600}.font-bold{font-weight:700}
    .font-extrabold{font-weight:800}
    .text-center{text-align:center}.text-left{text-align:left}
    .text-right{text-align:right}
    .uppercase{text-transform:uppercase}.capitalize{text-transform:capitalize}
    .tracking-wide{letter-spacing:.05em}.tracking-wider{letter-spacing:.1em}
    .tracking-widest{letter-spacing:.15em}
    .leading-none{line-height:1}.leading-tight{line-height:1.25}
    .leading-snug{line-height:1.375}.leading-normal{line-height:1.5}
    .leading-relaxed{line-height:1.625}
    .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .whitespace-nowrap{white-space:nowrap}
    .break-words{overflow-wrap:break-word;word-break:break-word}
    .italic{font-style:italic}
    .underline{text-decoration:underline}
    .line-through{text-decoration:line-through}

    /* Text colors */
    .text-white{color:#fff}
    .text-gray-300{color:#D1D5DB}.text-gray-400{color:#9CA3AF}
    .text-gray-500{color:#6B7280}.text-gray-600{color:#4B5563}
    .text-gray-700{color:#374151}.text-gray-800{color:#1F2937}
    .text-gray-900{color:#111827}
    .text-blue-500{color:#3B82F6}.text-blue-600{color:#2563EB}
    .text-blue-700{color:#1D4ED8}
    .text-green-500{color:#22C55E}.text-green-600{color:#16A34A}
    .text-green-700{color:#15803D}
    .text-red-400{color:#F87171}.text-red-500{color:#EF4444}
    .text-red-600{color:#DC2626}
    .text-yellow-500{color:#EAB308}.text-yellow-600{color:#CA8A04}
    .text-orange-500{color:#F97316}.text-orange-600{color:#EA580C}
    .text-emerald-600{color:#059669}

    /* Background colors */
    .bg-white{background-color:#fff}
    .bg-gray-50{background-color:#F9FAFB}
    .bg-gray-100{background-color:#F3F4F6}
    .bg-gray-200{background-color:#E5E7EB}
    .bg-blue-50{background-color:#EFF6FF}
    .bg-blue-100{background-color:#DBEAFE}
    .bg-blue-600{background-color:#2563EB}
    .bg-blue-700{background-color:#1D4ED8}
    .bg-green-50{background-color:#F0FDF4}
    .bg-green-100{background-color:#DCFCE7}
    .bg-green-600{background-color:#16A34A}
    .bg-red-50{background-color:#FEF2F2}
    .bg-red-100{background-color:#FEE2E2}
    .bg-yellow-50{background-color:#FEFCE8}
    .bg-yellow-100{background-color:#FEF9C3}
    .bg-orange-50{background-color:#FFF7ED}
    .bg-orange-100{background-color:#FFEDD5}
    .bg-emerald-50{background-color:#ECFDF5}
    .bg-emerald-100{background-color:#D1FAE5}

    /* Borders */
    .border{border:1px solid #E5E7EB}
    .border-0{border:0}
    .border-t{border-top:1px solid #E5E7EB}
    .border-b{border-bottom:1px solid #E5E7EB}
    .border-l{border-left:1px solid #E5E7EB}
    .border-r{border-right:1px solid #E5E7EB}
    .border-2{border-width:2px}
    .border-l-2{border-left-width:2px;border-left-style:solid}
    .border-l-4{border-left-width:4px;border-left-style:solid}
    .border-gray-100{border-color:#F3F4F6}
    .border-gray-200{border-color:#E5E7EB}
    .border-gray-300{border-color:#D1D5DB}
    .border-blue-200{border-color:#BFDBFE}
    .border-blue-300{border-color:#93C5FD}
    .border-green-300{border-color:#86EFAC}
    .border-red-200{border-color:#FECACA}
    .rounded{border-radius:4px}.rounded-sm{border-radius:2px}
    .rounded-md{border-radius:6px}.rounded-lg{border-radius:8px}
    .rounded-xl{border-radius:12px}.rounded-2xl{border-radius:16px}
    .rounded-full{border-radius:9999px}
    .rounded-t{border-radius:4px 4px 0 0}
    .rounded-b{border-radius:0 0 4px 4px}

    /* Width / Height */
    .w-full{width:100%}.w-auto{width:auto}
    .w-1\/2{width:50%}.w-1\/3{width:33.333%}
    .w-2\/3{width:66.667%}.w-1\/4{width:25%}.w-3\/4{width:75%}
    .w-4{width:16px}.w-6{width:24px}.w-8{width:32px}
    .w-10{width:40px}.w-12{width:48px}.w-16{width:64px}
    .h-full{height:100%}.h-auto{height:auto}
    .h-4{height:16px}.h-6{height:24px}.h-8{height:32px}
    .h-10{height:40px}.h-12{height:48px}
    .min-w-0{min-width:0}.max-w-full{max-width:100%}
    .min-h-0{min-height:0}

    /* Display */
    .block{display:block}.inline-block{display:inline-block}
    .inline{display:inline}.hidden{display:none}
    .table{display:table}.table-cell{display:table-cell}

    /* Position */
    .relative{position:relative}.absolute{position:absolute}
    .sticky{position:sticky}
    .inset-0{inset:0}

    /* Overflow */
    .overflow-hidden{overflow:hidden}.overflow-auto{overflow:auto}
    .overflow-x-auto{overflow-x:auto}

    /* Opacity / Effects */
    .opacity-0{opacity:0}.opacity-50{opacity:.5}.opacity-75{opacity:.75}
    .shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .shadow{box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
    .shadow-md{box-shadow:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06)}

    /* Table */
    .table-auto{table-layout:auto}.table-fixed{table-layout:fixed}
    .border-collapse{border-collapse:collapse}

    /* List */
    .list-none{list-style:none}.list-disc{list-style-type:disc}

    /* Cursor */
    .cursor-default{cursor:default}

    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #ffffff;
      width: 1280px;
      min-height: 720px;
      overflow: hidden;
      color: #1F2937;
      /* Sprint 13f — netteté typographique (rendu jugé médiocre) */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Variables marque ────────────────────────────────────────────── */
    :root {
      --primary:      #0095D9;
      --primary-dark: #00608A;
      --accent:       #FFCC00;
      --text:         #1F2937;
      --text-muted:   #6B7280;
      --card-bg:      #E6F4FB;
      --card-border:  #0095D9;
      --highlight-bg: #F0F9FF;
      --success:      #16A34A;
      --warn:         #EA580C;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .slide-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }
    .slide-header .section-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    .slide-header .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.3px;
    }
    .slide-header .section-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      margin-top: 2px;
    }
    .slide-header .brand-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 4px 10px;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .slide-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: #F3F4F6;
      border-top: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .slide-footer .footer-brand { font-weight: 700; color: var(--primary); }
    .slide-footer .footer-page { font-weight: 600; }

    /* ── Main content zone ───────────────────────────────────────────── */
    .slide-body {
      padding: 20px 32px 52px;
      position: relative;
    }

    /* ── KPI cards (ligne de métriques) ─────────────────────────────── */
    .kpi-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .kpi-card {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      /* Sprint 13f — profondeur */
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .kpi-card .kpi-icon {
      font-size: 24px;
      color: var(--primary);
      width: 30px;
      text-align: center;
    }
    .kpi-card .kpi-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1.05;
    }
    .kpi-card .kpi-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.2px;
    }

    /* ── Table concurrence ───────────────────────────────────────────── */
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      /* Sprint 13f — profondeur (via wrapper impossible : ombre directe) */
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
      border-radius: 8px;
      overflow: hidden;
    }
    .comp-table thead tr {
      background: var(--primary);
      color: #ffffff;
    }
    .comp-table thead th {
      padding: 10px 14px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.3px;
      text-align: left;
    }
    .comp-table tbody tr:nth-child(even) { background: var(--highlight-bg); }
    .comp-table tbody tr:nth-child(odd)  { background: #ffffff; }
    .comp-table tbody tr.is-direct {
      background: #FFF8E1;
      border-left: 3px solid var(--accent);
    }
    .comp-table tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid #E5E7EB;
      vertical-align: middle;
    }
    .comp-table .rating-stars { color: #F59E0B; font-size: 12px; }
    .comp-table .badge-direct {
      display: inline-block;
      background: var(--accent);
      color: #92400E;
      font-size: 10px;
      font-weight: 700;
      border-radius: 3px;
      padding: 1px 6px;
      text-transform: uppercase;
    }
    .comp-table .badge-indirect {
      display: inline-block;
      background: #E5E7EB;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      border-radius: 3px;
      padding: 1px 6px;
    }

    /* ── Strategic box ───────────────────────────────────────────────── */
    .strategic-box {
      background: var(--highlight-bg);
      border-left: 4px solid var(--primary);
      border-radius: 0 10px 10px 0;
      padding: 14px 20px;
      margin-top: 14px;
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.6;
      /* Sprint 13f — profondeur */
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.07);
    }
    .strategic-box .strat-icon {
      color: var(--primary);
      margin-right: 6px;
    }

    /* ── Accent bar sous titre de section ───────────────────────────── */
    .section-accent-bar {
      height: 3px;
      width: 40px;
      background: var(--accent);
      border-radius: 2px;
      margin-bottom: 14px;
    }

    /* ── Barres de score/jauge (Sprint 13e) ──────────────────────────
       Les agents improvisaient les barres en inline → invisibles.
       Usage : <div class="bar-track"><div class="bar-fill bar-green"
               style="width:57%"></div></div>                          */
    .bar-track {
      background: #F3F4F6;
      border-radius: 999px;
      height: 14px;
      width: 100%;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
      min-width: 6px;
    }
    .bar-green  { background: #16A34A; }
    .bar-orange { background: #EA580C; }
    .bar-red    { background: #DC2626; }
    .bar-blue   { background: var(--primary); }
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .score-row .score-label {
      width: 220px;
      flex: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .score-row .score-value {
      width: 64px;
      flex: none;
      text-align: right;
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }

    /* ── Badge estimation (honnêteté données C/D) ───────────────────── */
    .badge-estimation {
      display: inline-block;
      background: #FFF7ED;
      color: #EA580C;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="slide-header">
    <div>
      <div class="section-num">Section {SECTION_NUMBER} / {TOTAL_SECTIONS} — {STUDY_TYPE}</div>
      <div class="section-title">{SECTION_TITLE}</div>
      <div class="section-subtitle">{SECTION_SUBTITLE}</div>
    </div>
    <div class="brand-badge">{BRAND_NAME} · {ZONE} · {YEAR}</div>
  </header>

  <!-- MAIN CONTENT (généré par HTMLSlideAgent) -->
  <main class="slide-body">
    {MAIN_CONTENT}
  </main>

  <!-- FOOTER -->
  <footer class="slide-footer">
    <span><span class="footer-brand">{BRAND_NAME}</span> — Étude Stella</span>
    <span>{ZONE} · {YEAR}</span>
    <span class="footer-page">{SECTION_NUMBER} / {TOTAL_SECTIONS}</span>
  </footer>

</body>
</html>
